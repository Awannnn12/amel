<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besok Pulang</title>

<!-- Google Font Comic Neue -->
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    text-align: center;
    overflow: hidden;
    padding: 10px;
}

h1 {
    color: #fff;
    text-shadow: 2px 2px 5px #ff5f6d;
    font-size: 2.5rem;
    margin-bottom: 30px;
}

/* Container tombol */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    align-items: center;
}

button {
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}

/* Tombol YA super besar responsive */
button#yesBtn {
    width: 90%;           /* Hampir penuh layar HP */
    padding: 40px 0;      /* Tinggi tombol besar */
    font-size: 2.5rem;    /* Font besar tapi sesuai layar */
    background-color: #fff;
    color: #ff5f6d;
}

/* Tombol TIDAK kecil dan lari-larian */
button#noBtn {
    width: 40%;
    padding: 15px 0;
    font-size: 1.5rem;
    background-color: #fff;
    color: #ff5f6d;
    position: relative;
}

button:hover {
    transform: scale(1.05);
}

#message {
    margin-top: 30px;
    font-size: 1.8rem;
    color: #fff;
    text-shadow: 1px 1px 3px #ff5f6d;
}

/* Hati jatuh */
.heart {
    position: absolute;
    color: #ff2d95;
    font-size: 24px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-50px) rotate(0deg);}
    100% {transform: translateY(110vh) rotate(360deg);}
}

/* Responsive untuk layar sangat kecil */
@media (max-width: 400px) {
    h1 {
        font-size: 2rem;
    }
    button#yesBtn {
        font-size: 2rem;
        padding: 30px 0;
    }
    button#noBtn {
        font-size: 1.2rem;
        width: 50%;
    }
    #message {
        font-size: 1.5rem;
    }
}
</style>
</head>
<body>

<h1>BESOK PULANG SAMA B YAA AMELLLLL 💖</h1>

<div class="buttons">
    <button id="yesBtn">YA</button>
    <button id="noBtn">TIDAK</button>
</div>

<div id="message"></div>

<script>
// Pesan tombol
const yesBtn = document.getElementById('yesBtn');
const noBtn = document.getElementById('noBtn');
const message = document.getElementById('message');

yesBtn.addEventListener('click', () => {
    message.textContent = "YEEEEYYY TIMAKASII SAYANGG MWAHH 😘🥰😍";
});

noBtn.addEventListener('click', () => {
    message.textContent = "Yahhh tidaaa mau ya sayaangg :( 🥺💔";
});

// Tombol TIDAK susah diklik
noBtn.addEventListener('mouseover', () => {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
    noBtn.style.position = 'absolute';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
});

// Hati jatuh
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.textContent = '💖';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(heart);
    setTimeout(() => {
        heart.remove();
    }, 5000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
